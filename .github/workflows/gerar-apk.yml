name: 📱 Gerar APK — CPAD ELIM

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Tipo de build'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]

jobs:
  build-apk:
    name: Build APK Android
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────
      - name: 🟢 Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Instalar dependências ───────────────────────────────
      - name: 📦 Instalar dependências Capacitor
        run: npm install

      # ── 4. Preparar pasta www ──────────────────────────────────
      - name: 🌐 Preparar arquivos web (www/)
        run: npm run prepare-www

      # ── 5. Adicionar Android (só se não existir) ───────────────
      - name: 🤖 Adicionar plataforma Android
        run: |
          if [ ! -d "android" ]; then
            echo "Adicionando plataforma Android..."
            npx cap add android
          else
            echo "Pasta android já existe, pulando cap add."
          fi

      # ── 6. Sincronizar Capacitor ───────────────────────────────
      - name: 🔄 Sincronizar Capacitor
        run: npx cap sync android

      # ── 7. JDK ────────────────────────────────────────────────
      - name: ☕ Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 8. Cache Gradle ────────────────────────────────────────
      - name: 📂 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 9. Permissão Gradle ────────────────────────────────────
      - name: 🔑 Permissão gradlew
        run: chmod +x android/gradlew

      # ── 10. Build DEBUG ────────────────────────────────────────
      - name: 🔨 Build APK Debug
        if: ${{ github.event.inputs.build_type != 'release' }}
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ── 11. Build RELEASE (assinado) ───────────────────────────
      - name: 🚀 Build APK Release
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      # ── 12. Upload APK Debug ───────────────────────────────────
      - name: 📤 Upload APK Debug
        if: ${{ github.event.inputs.build_type != 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: CPAD-ELIM-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 13. Upload APK Release ─────────────────────────────────
      - name: 📤 Upload APK Release
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: CPAD-ELIM-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      # ── 14. Resumo ─────────────────────────────────────────────
      - name: ✅ Resumo do Build
        if: success()
        run: |
          echo "## ✅ APK CPAD ELIM gerado com sucesso!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App | CPAD ELIM |" >> $GITHUB_STEP_SUMMARY
          echo "| Package | br.com.cpad.elim |" >> $GITHUB_STEP_SUMMARY
          echo "| Tipo | ${{ github.event.inputs.build_type || 'debug' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Baixe o APK na aba **Artifacts** acima." >> $GITHUB_STEP_SUMMARY
